<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5a623" />
      <stop offset="100%" stop-color="#ffcca3" />
    </linearGradient>
  </defs>
  
  <!-- Subtle circular background glow -->
  <circle cx="256" cy="256" r="240" fill="url(#glow)" />
  
  <!-- Stylized M and C Monogram -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- 'C' - Golden Yellow, wrapping the left and bottom -->
    <path d="M 370,160 
             C 270,100 130,130 130,256 
             C 130,382 270,412 370,352" 
          fill="none" 
          stroke="url(#goldGrad)" 
          stroke-width="56" />
          
    <!-- 'M' - Crisp White, standing tall inside the C-shape -->
    <path d="M 210,350 
             V 190 
             L 280,280 
             L 350,190 
             V 350" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="48" />
  </g>
</svg>
